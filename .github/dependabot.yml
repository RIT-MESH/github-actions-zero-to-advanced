version: 2
updates:
  # Keep GitHub Actions versions current
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"
  # Keep npm dependencies current (node-app example)
  - package-ecosystem: "npm"
    directory: "/examples/node-app"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
  # Keep Python dependencies current
  - package-ecosystem: "pip"
    directory: "/examples/python-app"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
