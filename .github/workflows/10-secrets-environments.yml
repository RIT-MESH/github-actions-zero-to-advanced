name: "10 - Secrets and Environments"
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/10-secrets-environments.yml"
permissions:
  contents: read
jobs:
  show-secret-meta:
    runs-on: ubuntu-latest
    env:
      FAKE_TOKEN: ${{ secrets.FAKE_TOKEN }}
    steps:
      - name: Confirm secret presence without printing it
        run: |
          if [ -z "$FAKE_TOKEN" ]; then
            echo "FAKE_TOKEN is not set (that is fine for this demo)"
          else
            echo "FAKE_TOKEN is set, length is ${#FAKE_TOKEN}"
          fi
  simulated-env:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - run: echo "Running in the 'staging' environment (simulated)"
