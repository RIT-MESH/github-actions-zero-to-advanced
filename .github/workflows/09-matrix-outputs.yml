name: "09 - Matrix and Outputs"
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/09-matrix-outputs.yml"
permissions:
  contents: read
jobs:
  matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.version }}
      - name: Report version
        run: python -c "import sys; print('Python ' + sys.version.split()[0])"
  produce:
    needs: matrix
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set.outputs.version }}
    steps:
      - id: set
        run: echo "version=1.2.3" >> "$GITHUB_OUTPUT"
  consume:
    needs: produce
    runs-on: ubuntu-latest
    steps:
      - run: echo "Produced version is ${{ needs.produce.outputs.version }}"
