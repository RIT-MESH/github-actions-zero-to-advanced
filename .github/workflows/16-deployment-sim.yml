name: "16 - Deployment Simulation"
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/16-deployment-sim.yml"
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: echo "building (simulated)" > artifact.txt
      - uses: actions/upload-artifact@v4
        with:
          name: deploy-build
          path: artifact.txt
  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: deploy-build
      - run: echo "Deploying to STAGING (simulated)"
  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Deploying to PRODUCTION (simulated)"
