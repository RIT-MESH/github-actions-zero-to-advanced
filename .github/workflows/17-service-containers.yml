name: "17 - Service Containers"
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/17-service-containers.yml"
permissions:
  contents: read
jobs:
  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Wait for Postgres
        run: |
          for i in $(seq 1 10); do
            pg_isready -h localhost -p 5432 -U postgres && break
            sleep 2
          done
          pg_isready -h localhost -p 5432 -U postgres
      - name: Confirm database exists
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d testdb -c "SELECT version();"