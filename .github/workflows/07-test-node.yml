name: "07 - Test Node App"
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "examples/node-app/**"
      - ".github/workflows/07-test-node.yml"
  pull_request:
    paths:
      - "examples/node-app/**"
      - ".github/workflows/07-test-node.yml"
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: examples/node-app/package-lock.json
      - name: Install and test
        run: |
          cd examples/node-app
          npm ci
          npm test
