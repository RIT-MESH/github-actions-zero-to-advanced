name: "11 - Docker Build"
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "examples/python-app/**"
      - ".github/workflows/11-docker-build.yml"
permissions:
  contents: read
jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (no push, no registry)
        uses: docker/build-push-action@v6
        with:
          context: examples/python-app
          push: false
          load: true
          tags: python-app-demo:ci
      - name: Run the image
        run: docker run --rm python-app-demo:ci
