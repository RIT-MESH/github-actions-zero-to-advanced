name: "12 - Reusable Build"
on:
  workflow_call:
    inputs:
      app-name:
        required: true
        type: string
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build (simulated)
        run: |
          echo "Building ${{ inputs.app-name }}"
          mkdir -p dist
          echo "${{ inputs.app-name }} build artifact" > dist/app.txt
      - uses: actions/upload-artifact@v4
        with:
          name: reusable-build
          path: dist/app.txt
