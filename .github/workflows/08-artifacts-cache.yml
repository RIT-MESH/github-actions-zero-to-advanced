name: "08 - Artifacts and Cache"
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/08-artifacts-cache.yml"
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-3.12-${{ hashFiles('examples/python-app/requirements.txt') }}
      - name: Make a build file
        run: |
          echo "build output version 1.0" > build-output.txt
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build-output.txt
  download:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
      - name: Show it
        run: cat build-output.txt
