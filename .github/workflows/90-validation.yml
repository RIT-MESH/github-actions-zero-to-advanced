name: "Validation"
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
concurrency:
  group: validation-${{ github.ref }}
  cancel-in-progress: true
jobs:
  yaml-json:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate YAML and JSON
        run: python scripts/validate_yaml_json.py

  markdown:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Basic Markdown check
        run: node scripts/validate-markdown.js

  links:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check internal Markdown links
        run: python scripts/validate-links.py

  python-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -r examples/python-app/requirements.txt
      - run: |
          cd examples/python-app
          python -m pytest -q

  node-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: |
          cd examples/node-app
          npm test

  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install actionlint (audit hash)
        run: |
          curl -sSL -o /tmp/actionlint.tgz https://github.com/rhysd/actionlint/releases/download/v1.7.7/actionlint_1.7.7_linux_amd64.tar.gz
          echo "actionlint sha256: $(shasum -a 256 /tmp/actionlint.tgz | awk '{print $1}')"
          # NOTE: For production, verify this against the SHA published in the release notes.
          tar -xzf /tmp/actionlint.tgz -C /tmp actionlint
          echo "/tmp" >> "$GITHUB_PATH"
      - name: Run actionlint
        run: actionlint -color

  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install gitleaks with checksum verification
        run: |
          set -e
          GL=gitleaks_8.24.3_linux_x64.tar.gz
          curl -sSL -o "/tmp/$GL" "https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/$GL"
          curl -sSL -o /tmp/gitleaks_checksums.txt "https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_checksums.txt"
          ACTUAL="$(shasum -a 256 "/tmp/$GL" | awk '{print $1}')"
          if grep -q "$ACTUAL" /tmp/gitleaks_checksums.txt; then
            echo "Gitleaks checksum verified: $ACTUAL"
          else
            echo "::error::Gitleaks checksum mismatch: $ACTUAL"
            exit 1
          fi
          tar -xzf "/tmp/$GL" -C /tmp gitleaks
          echo "/tmp" >> "$GITHUB_PATH"
      - name: Scan source tree
        run: gitleaks detect --source . --config .gitleaks.toml --no-banner -v

  workflow-syntax:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Parse workflow YAML files
        run: python scripts/validate-workflows.py