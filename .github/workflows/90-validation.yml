name: "Validation"
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  yaml-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate YAML and JSON
        run: python scripts/validate_yaml_json.py

  markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Basic Markdown check
        run: node scripts/validate-markdown.js

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -r examples/python-app/requirements.txt
      - run: |
          cd examples/python-app
          python -m pytest -q

  node-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: |
          cd examples/node-app
          npm test

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install gitleaks
        run: |
          curl -sSL -o /tmp/gitleaks.tgz https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          echo "/tmp" >> "$GITHUB_PATH"
      - name: Scan source tree
        run: gitleaks detect --source . --config .gitleaks.toml --no-banner -v

  workflow-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Parse workflow YAML files
        run: python scripts/validate-workflows.py