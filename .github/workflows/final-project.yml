name: "Final Project - Capstone CI/CD"
on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/final-project.yml"
      - "examples/python-app/**"
    tags: ["v*"]
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: final-project-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: python scripts/validate_yaml_json.py

  lint:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Syntax check
        run: python -m py_compile examples/python-app/app.py

  test:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ matrix.python-version }}" }
      - run: |
          python -m pip install --upgrade pip
          pip install -r examples/python-app/requirements.txt
      - run: |
          cd examples/python-app
          python -m pytest -q

  coverage:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: |
          python -m pip install --upgrade pip
          pip install -r examples/python-app/requirements.txt
      - name: Run tests with coverage
        run: |
          cd examples/python-app
          python -m pytest --cov=app --cov-report=xml --cov-report=term -q
      - name: Add coverage summary
        run: |
          echo "## Coverage report" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          (cd examples/python-app && python -m pytest --cov=app --cov-report=term-missing -q) >> "$GITHUB_STEP_SUMMARY" 2>&1 || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: examples/python-app/coverage.xml

  security-scan:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Install gitleaks (checksum verified)
        run: |
          set -e
          GL=gitleaks_8.24.3_linux_x64.tar.gz
          curl -sSL -o "/tmp/$GL" "https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/$GL"
          curl -sSL -o /tmp/gitleaks_checksums.txt "https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_checksums.txt"
          ACTUAL="$(shasum -a 256 "/tmp/$GL" | awk '{print $1}')"
          grep -q "$ACTUAL" /tmp/gitleaks_checksums.txt || { echo "::error::checksum mismatch $ACTUAL"; exit 1; }
          tar -xzf "/tmp/$GL" -C /tmp gitleaks
          echo "/tmp" >> "$GITHUB_PATH"
      - run: gitleaks detect --source . --config .gitleaks.toml --no-banner -v

  build:
    needs: [test, coverage]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Package the app
        run: |
          mkdir -p dist
          tar -czf dist/python-app.tar.gz -C examples python-app
          sha256sum dist/python-app.tar.gz > dist/checksums.txt
      - uses: actions/upload-artifact@v4
        with:
          name: python-app-package
          path: dist/

  docker:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: examples/python-app
          push: false
          load: true
          tags: final-app:ci
      - name: Run image
        run: docker run --rm final-app:ci
      - name: Scan image with Trivy (informational)
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: final-app:ci
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

  sbom:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: examples/python-app
          format: spdx-json
          output-file: sbom.spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

  deploy-staging:
    needs: [test, coverage, security-scan, build, docker, sbom]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: staging
    steps:
      - run: echo "Deploying to STAGING (simulated, no cloud resources)"

  deploy-production:
    needs: deploy-staging
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production
    steps:
      - run: echo "Deploying to PRODUCTION (simulated, after manual approval)"

  release:
    needs: [build, sbom, docker]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: python-app-package, path: dist }
      - uses: actions/download-artifact@v4
        with: { name: sbom, path: release-assets }
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: |
            dist/python-app.tar.gz
            dist/checksums.txt
            release-assets/sbom.spdx.json